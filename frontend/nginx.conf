server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass influ-production.up.railway.app;
    }

    location /static {
        proxy_pass influ-production.up.railway.app;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}