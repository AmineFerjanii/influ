services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - IG_USERNAME=${IG_USERNAME:-}
      - IG_PASSWORD=${IG_PASSWORD:-}
      - IG_MIN_DELAY=${IG_MIN_DELAY:-8}
      - IG_MAX_DELAY=${IG_MAX_DELAY:-15}
      - SCRAPER_API_KEY=${SCRAPER_API_KEY:-}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      - APIFY_API_KEY=${APIFY_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
